---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-deployment
  labels:
    app.kubernetes.io/name: &name app-deployment
    app.kubernetes.io/instance: &instance testdp
    app.kubernetes.io/version: &version v0.0.1
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: *name
      app.kubernetes.io/instance: *instance
      app.kubernetes.io/version: *version
  template:
    metadata:
      labels:
        app.kubernetes.io/name: *name
        app.kubernetes.io/instance: *instance
        app.kubernetes.io/version: *version
    spec:
      volumes:
      - name: config-template
        configMap:
          name: app-config
      - name: app-config
        emptyDir: {}
      initContainers:
      - name: config-init
        image: busybox:1.28
        imagePullPolicy: IfNotPresent
        command:
        - sh
        - -c
        - |
          sed -e "s|{{APP_NAME}}|$APP_NAME|g" \
              -e "s|{{APP_VERSION}}|$APP_VERSION|g" \
              -e "s|{{DATABASE_URL}}|$DATABASE_URL|g" \
          /config-template/config-template.txt > /app-config/app-config.txt
          echo "Done"
        env:
        - name: APP_NAME
          value: "MyApplication"
        - name: APP_VERSION
          value: "v1.0.0"
        - name: DATABASE_URL
          value: "postresql://user:password@db:5432/mydb"
        volumeMounts:
        - name: config-template
          mountPath: /config-template
        - name: app-config
          mountPath: /app-config
      containers:
      - name: app-container
        image: nginx:1.28
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        volumeMounts:
        - name: app-config
          mountPath: /etc/app-config
          readOnly: true
        resources:
          requests:
            cpu: "250m"
            memory: "64Mi"
          limits:
            cpu: "500m"
            memory: "128Mi"
