# ВНИМАНИЕ: Этот манифест демонстрирует КРАЙНЕ небезопасную конфигурацию.
# НЕ ИСПОЛЬЗУЙТЕ его в производственной среде
---
apiVersion: v1
kind: Pod
metadata:
  name: hostpath-security-risk
  labels:
    app.kubernetes.io/name: hostpath-security-risk
spec:
  containers:
  - name: main
    image: busybox:1.37
    command: ["/bin/sh", "-c", "sleep 1h"]
    securityContext:
       # Запускаем контейнер от имен root
       runAsUser: 0
    volumeMounts:
    - name: host-proc
      mountPath: /host-proc
    resources:
      limits:
        memory: "128Mi"
        cpu: "500m"
      requests:
        memory: "64Mi"
        cpu: "250m"
  volumes:
  - name: host-proc
    hostPath:
      path: /proc
      type: Directory

