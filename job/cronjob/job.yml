---
apiVersion: batch/v1
kind: Job
metadata:
  name: myjob
  labels:
    app.kubernetes.io/name: myjob
    app.kubernetes.io/version: v0.0.1
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: test-job
        image: busybox:1.28
        command:
          - 'sh'
          - '-c'
          - 'echo "Test job running"... && sleep 10 && exit 0'
        resources:
          requests:
            memory: "128Mi"
            cpu: "250m"
          limits:
            memory: "256Mi"
            cpu: "500m"
