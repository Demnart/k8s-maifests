---
apiVersion: v1
kind: Pod
metadata:
  name: init-container
  labels:
    app: nginx
    version: 1.27.5
spec:
  initContainers:
  - name: init-container
    image: busybox:1.28
    command: ['sh', '-c','echo The init-container is running! && sleep 10']
  containers:
  - name: nginx
    image: nginx:1.27.5
    resources:
      limits:
        memory: "128Mi"
        cpu: "500m"
      requests:
        memory: "64Mi"
        cpu: "250m"
    readinessProbe:
      tcpSocket:
        port: 80
      initialDelaySeconds: 5
      periodSeconds: 5
    livenessProbe:
      tcpSocket:
        port: 80
      initialDelaySeconds: 5
      periodSeconds: 5
    ports:
      - containerPort: 80
